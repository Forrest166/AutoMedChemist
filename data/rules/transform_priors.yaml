version: transform-priors-0.1
description: >
  Bootstrap transform priors for functional-group replacement enumeration.
  Scores combine curated medicinal chemistry precedent, approximate property
  movement, synthetic familiarity, and activity-cliff risk. Quantitative MMPDB
  imports can replace or augment these entries in later releases.
